<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Nobody-Nobody1 - Dev Portfolio</title>
</head>

<body>
    <header class="site_header">
        <div class="wrapper_inner">
            <nav class="site_header_nav">
                <ul role="list" class="flex flex_center">
                    <li><a href="#0">HOME</a></li>
                    <li><a href="#about">ABOUT</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main>
        <section id="hero">
            <div class="wrapper">
                <div class="wrapper_inner">
                    <div class="text_center hero_content">
                        <h1 class="h2">Nobody-Nobody1</h1>
                        <p class="h5">Hobby Programmer</p>
                    </div>
                </div>
                <ul role="list" class="flex flex_between hero_social">
                    <address>Somewhere on Earth</address>
                    <ul role="list" class="flex">
                        <li>Find me online</li>
                        <li>
                            <a href="https://github.com/Nobody-Nobody1" target="_blank">
                                <img src="assets\user.jpg" alt="GitHub Profile Picture" width="24" height="24" />
                            </a>
                        </li>
                    </ul>
                </ul>
            </div>
        </section>
        <section id="about">
            <div class="wrapper">
                <div class="text_center">
                    <h2>
                        I am a hobby programmer with exprience with Javascript, Java, Python and currently interested in
                        learning C++ or C.
                    </h2>
                </div>
                <div class="wrapper_inner">
                    <div class="about_content flex flex_around">
                        <figure class="about_figure text_center">
                            <img width="200px" height="200px" src="/assets/user.jpg" alt="Developer"
                                class="about_img" />
                            <figcaption class="about_caption">Nobody_Nobody1</figcaption>
                        </figure>
                        <p class="h5">
                            I've done a few projects for some organizations as well on my own.
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
